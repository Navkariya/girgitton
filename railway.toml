# Railway deploy konfiguratsiyasi (root)
# Foydalanish: https://railway.app -> Deploy from GitHub Repo -> Navkariya/girgitton

[build]
builder = "NIXPACKS"

[deploy]
# requirements.txt orqali deps o'rnatiladi, src/ ni PYTHONPATH ga qo'shamiz
# (paket pip install qilinmaydi — src layout)
startCommand = "PYTHONPATH=src python -m girgitton.bot"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
healthcheckPath = "/health"
healthcheckTimeout = 30
numReplicas = 1
sleepApplication = false
