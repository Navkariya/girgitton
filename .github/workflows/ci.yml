name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-type-test:
    name: Lint, type, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[app,dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Mypy (informational — non-blocking)
        run: mypy src/girgitton || true
        continue-on-error: true

      - name: Pytest with coverage
        env:
          PYTHONPATH: src
        run: pytest -q --cov=girgitton --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bandit + pip-audit
        run: pip install bandit pip-audit
      - name: Bandit
        run: bandit -r src/ -ll
      - name: Pip-audit (dependencies)
        run: pip-audit --strict || true   # informational
