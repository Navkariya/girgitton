name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: Girgitton_Windows.exe
          - os: macos-latest
            artifact: Girgitton_macOS.zip
          - os: ubuntu-latest
            artifact: Girgitton_Linux.bin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-app.txt pyinstaller

      - name: Build executable
        run: pyinstaller build/girgitton.spec

      - name: Rename (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: mv dist/Girgitton.exe dist/Girgitton_Windows.exe

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r Girgitton_macOS.zip Girgitton.app

      - name: Rename (Linux)
        if: runner.os == 'Linux'
        run: mv dist/Girgitton dist/Girgitton_Linux.bin

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
          generate_release_notes: true
