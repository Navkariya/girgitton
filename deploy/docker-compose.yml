version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      PORT: 8080
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  redis_data:
