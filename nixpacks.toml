# Nixpacks build provider (Railway)
# Minimal: Nixpacks default Python provider'i pyproject.toml'ni avtomatik aniqlab,
# `pip install .` ni qiladi. Faqat env variables va start command override qilinadi.

providers = ["python"]

[phases.install]
cmds = ["pip install --no-cache-dir ."]

[start]
cmd = "python -m girgitton.bot"

[variables]
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"
LOG_JSON = "true"
