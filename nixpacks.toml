# Nixpacks build provider (Railway)
# Faqat core deps (bot uchun) — app extras (customtkinter, tkinterdnd2) Linux serverga kerak emas

providers = ["python"]

[phases.setup]
nixPkgs = ["python311", "gcc", "libffi"]

[phases.install]
cmds = [
    "python -m pip install --upgrade pip",
    "pip install --no-cache-dir .",
]

[start]
cmd = "python -m girgitton.bot"

[variables]
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"
LOG_JSON = "true"
